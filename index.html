<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>משימות</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a56db" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="משימות" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="icon" href="icons/icon-192.svg" />

  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1 id="header-title">המשימות שלי</h1>
    <button id="btn-settings" class="icon-btn" aria-label="הגדרות">
      <i class="ti ti-settings"></i>
    </button>
  </header>

  <main id="view-list" class="view">
    <section class="filters">
      <select id="filter-category" aria-label="פילטר קטגוריה">
        <option value="">כל הקטגוריות</option>
      </select>
      <select id="filter-priority" aria-label="פילטר עדיפות">
        <option value="">כל העדיפויות</option>
        <option value="high">גבוהה</option>
        <option value="medium">בינונית</option>
        <option value="low">נמוכה</option>
      </select>
      <select id="filter-status" aria-label="פילטר סטטוס">
        <option value="">הכל</option>
        <option value="open">פתוח</option>
        <option value="done">הושלם</option>
      </select>
      <button id="btn-clear-filters" class="btn-text">נקה פילטרים</button>
    </section>

    <ul id="task-list" class="task-list"></ul>
    <p id="empty-state" class="empty-state" hidden>אין משימות להצגה</p>
  </main>

  <section id="view-form" class="view" hidden>
    <header class="form-header">
      <button id="btn-cancel-form" class="icon-btn" aria-label="חזרה">
        <i class="ti ti-arrow-right"></i>
      </button>
      <h2 id="form-title">משימה חדשה</h2>
      <button id="btn-delete-task" class="icon-btn danger" aria-label="מחיקה" hidden>
        <i class="ti ti-trash"></i>
      </button>
    </header>

    <form id="task-form" class="task-form">
      <input type="hidden" id="task-id" />

      <label class="field">
        <span>כותרת *</span>
        <input type="text" id="task-title" placeholder="הקלד שם משימה" required />
        <span class="error-msg" id="error-title" hidden>נא להזין כותרת</span>
      </label>

      <label class="field">
        <span>תאריך יעד</span>
        <input type="date" id="task-due-date" />
      </label>

      <label class="field">
        <span>עדיפות</span>
        <select id="task-priority">
          <option value="low">נמוכה</option>
          <option value="medium" selected>בינונית</option>
          <option value="high">גבוהה</option>
        </select>
      </label>

      <label class="field">
        <span>קטגוריה</span>
        <select id="task-category"></select>
      </label>

      <div class="field" id="new-category-field" hidden>
        <span>קטגוריה חדשה</span>
        <div class="inline-add">
          <input type="text" id="new-category-name" placeholder="שם קטגוריה" />
          <button type="button" id="btn-add-category" class="btn-secondary">הוסף</button>
        </div>
      </div>
      <button type="button" id="btn-toggle-new-category" class="btn-text">+ קטגוריה חדשה</button>

      <label class="field">
        <span>הערות</span>
        <textarea id="task-notes" placeholder="הערות חופשיות" rows="4"></textarea>
      </label>

      <button type="submit" class="btn-primary">שמירה</button>
    </form>
  </section>

  <section id="view-settings" class="view" hidden>
    <header class="form-header">
      <button id="btn-back-settings" class="icon-btn" aria-label="חזרה">
        <i class="ti ti-arrow-right"></i>
      </button>
      <h2>ניהול קטגוריות</h2>
    </header>

    <div class="settings-body">
      <ul id="category-list" class="category-list"></ul>
      <div class="inline-add">
        <input type="text" id="settings-new-category" placeholder="שם קטגוריה חדשה" />
        <button type="button" id="btn-settings-add-category" class="btn-secondary">הוסף</button>
      </div>
    </div>
  </section>

  <button id="btn-fab-add" class="fab" aria-label="הוספת משימה">
    <i class="ti ti-plus"></i>
  </button>

  <div id="toast" class="toast" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
